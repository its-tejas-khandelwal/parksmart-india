{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div class="text-center py-24">
  <div class="text-8xl font-black text-gray-200 dark:text-slate-800 mb-4">404</div>
  <h1 class="text-2xl font-bold mb-2">Page Not Found</h1>
  <p class="text-gray-500 mb-6">The page you're looking for doesn't exist.</p>
  <a href="{{ url_for('index') }}" class="bg-emerald-600 text-white px-6 py-3 rounded-xl hover:bg-emerald-700">Go Home</a>
</div>
{% endblock %}
