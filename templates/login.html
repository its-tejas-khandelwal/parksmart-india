{% extends "base.html" %}
{% block title %}Login — SpotEasy{% endblock %}
{% block content %}
<div style="max-width:420px;margin:40px auto;">
  <div class="glass-card anim-item visible" style="padding:36px;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="width:52px;height:52px;background:linear-gradient(135deg,#6366F1,#22D3EE);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;color:white;margin:0 auto 16px;font-weight:800;font-family:'Syne',sans-serif;">P</div>
      <h1 class="syne" style="font-size:24px;font-weight:700;margin-bottom:4px;">Welcome back</h1>
      <p style="color:var(--text-secondary);font-size:14px;">Sign in to SpotEasy</p>
    </div>
    <form method="post">
      <div style="margin-bottom:14px;">
        <label class="label-text">Email</label>
        <input type="email" name="email" class="inp" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div style="margin-bottom:18px;">
        <label class="label-text">Password</label>
        <input type="password" name="password" class="inp" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;padding:12px;">Sign In →</button>
    </form>
    <p style="text-align:center;margin-top:18px;font-size:13px;color:var(--text-secondary);">
      No account? <a href="{{ url_for('register') }}" style="color:#22D3EE;text-decoration:none;font-weight:600;">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
