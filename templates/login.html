{% extends "base.html" %}
{% block title %}Login — ParkSmart{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10">
  <div class="bento bg-white dark:bg-slate-900 shadow-xl">
    <div class="text-center mb-8">
      <i data-lucide="parking-circle" class="w-12 h-12 text-emerald-600 mx-auto mb-3"></i>
      <h2 class="text-2xl font-bold">Welcome Back</h2>
      <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Sign in to ParkSmart India</p>
    </div>
    <form method="POST" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Email Address</label>
        <input type="email" name="email" required placeholder="you@example.com"
               class="w-full border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"/>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <input type="password" name="password" required placeholder="••••••••"
               class="w-full border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"/>
      </div>
      <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl transition">
        Sign In →
      </button>
    </form>
    <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
      Don't have an account? <a href="{{ url_for('register') }}" class="text-emerald-600 font-medium hover:underline">Register</a>
    </p>
  </div>
</div>
{% endblock %}
