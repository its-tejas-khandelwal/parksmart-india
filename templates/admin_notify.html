{% extends "base.html" %}
{% block title %}Send Notification — SpotEasy Admin{% endblock %}
{% block content %}
<div style="max-width:560px;margin:0 auto;">
  <div style="margin-bottom:18px;" class="anim-item visible">
    <a href="{{ url_for('admin_dashboard') }}" style="color:var(--text-secondary);text-decoration:none;font-size:13px;">← Back</a>
    <h1 class="syne" style="font-size:22px;font-weight:700;margin-top:8px;">📧 Send Notification</h1>
    <p style="color:var(--text-secondary);font-size:13px;margin-top:3px;">Notification appears in-app, in browser (if allowed) and via email (if SMTP configured).</p>
  </div>
  <form method="post" class="glass-card anim-item visible" style="padding:24px;">
    <div style="margin-bottom:13px;">
      <label class="label-text">Recipient</label>
      <select name="user_id" class="inp">
        <option value="all">📢 Everyone ({{ all_users|length }} users)</option>
        {% for u in all_users %}
        <option value="{{ u.id }}">{{ u.name }} — {{ u.email }} ({{ u.role }})</option>
        {% endfor %}
      </select>
    </div>
    <div style="margin-bottom:13px;">
      <label class="label-text">Title</label>
      <input type="text" name="title" class="inp" placeholder="System update" required maxlength="120"/>
    </div>
    <div style="margin-bottom:18px;">
      <label class="label-text">Message</label>
      <textarea name="body" class="inp" rows="5" placeholder="Type your message…"></textarea>
    </div>
    <button type="submit" class="btn-primary" style="width:100%;padding:12px;">📤 Send Notification</button>
  </form>
</div>
{% endblock %}
